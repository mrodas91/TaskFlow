# ¿Cuándo se dispara este workflow?
on:
  push:
    branches: [ main, develop ]        # Al hacer push directo a main
  pull_request:
    branches: [ main, develop ]        # Al abrir/actualizar un PR hacia main

jobs:
  build-and-test:
    # ¿En qué máquina corre?
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Instala .NET 8 en esa máquina virtual
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3. Restaura los paquetes NuGet (equivalente a npm install)
      - name: Restore dependencies
        run: dotnet restore src/TaskFlow.sln

      # 4. Compila el proyecto
      - name: Build
        run: dotnet build src/TaskFlow.sln --no-restore --configuration Release

      # 5. Ejecuta los tests
      #- name: Test
      #  run: dotnet test src/TaskFlow.sln --no-build --configuration Release
  # ─── JOB 2: Docker Build y Push ───────────────────────────
  docker:
    runs-on: ubuntu-latest
    
    # Este job solo corre si:
    # 1. El job anterior pasó
    # 2. Es un push directo (no un PR)
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Determina el tag de la imagen según el branch
      # develop → taskflow-api:develop
      # main    → taskflow-api:latest
      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.tag.outputs.tag }}

  # ─── JOB 3: Docker Web ────────────────────────────────────
  docker-web:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./src/TaskFlow.Web
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-web:${{ steps.tag.outputs.tag }}